apiVersion: inference.networking.x-k8s.io/v1alpha1
kind: EndpointPickerConfig
plugins:
  test1:
    pluginName: test-one
    parameters:
      threshold: 10
  profileHandler:
    pluginName: test-profile-handler
  test2:
    pluginName: test-two
    parameters:
      hashBlockSize: 32
  testPicker:
    pluginName: test-picker

schedulingProfiles:
  default:
    plugins:
    - pluginRef: test1
    - pluginRef: test2
      weight: 50
    - pluginRef: testPicker
